review_name: "Language-network neuroimaging review"

# 研究领域（可多选）
research_field:
  - psychology
  - neuroscience
  - cognitive_science

# 一句话描述综述的核心研究主题
research_topic_statement: "Investigate neural mechanisms of language processing and their network-level organization."

# 方法学限定
methodology:
  include:
    - fmri
    - eeg
    - meg
    - fnirs
    - behavior
  exclude:
    - purely_theoretical
    - animal_only
    - purely_review

# 被试范围限定
participant_scope:
  species: ["human"]
  age_range:
    min: 0
    max: 100
  language_background: ["monolingual", "bilingual"]
  minimum_sample_size: 1

# 疾病研究与 case report 策略
# allow_case_report: 是否纳入 case report
# include_disease_studies: 是否纳入疾病人群
# disease_whitelist / disease_blacklist 用于更精细控制
disease_and_case_report_policy:
  include_disease_studies: true
  allow_case_report: true
  disease_whitelist: ["aphasia", "stroke"]
  disease_blacklist: ["severe dementia"]

# 发表与可获取性限制
publication_filters:
  year_from: 1998
  languages: ["English"]
  publication_types_include: ["journal_article"]
  require_abstract: true
  prefer_open_access_pdf: true

# 优先信号：满足越多，越应优先纳入
priority_signals:
  - "reports statistical tests for language-related neural activity"
  - "provides explicit brain regions or network interpretation"

# 排除信号：出现即高风险排除
exclusion_signals:
  - "review article"
  - "protocol only"
  - "no human participants"

# 决策策略
# min_confidence_to_include: 模型置信度阈值
# uncertain_bucket: 低置信度时的处理策略（manual_review / exclude）
# require_reason_fields: 要求模型输出的关键解释字段
decision_policy:
  min_confidence_to_include: 0.70
  uncertain_bucket: manual_review
  require_reason_fields:
    - "topic_fit"
    - "method_fit"
    - "participant_fit"
    - "risk_flags"
